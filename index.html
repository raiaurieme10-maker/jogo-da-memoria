<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    color: white;
    margin: 0;
}

/* TELAS */
#login, #game, #ranking {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* FUNDO LOGIN */
#login {
    display: flex;
    background: url('fundo-login.jpg') no-repeat center center;
    background-size: cover;
}

/* FUNDO JOGO */
#game {
    background: url('fundo-jogo.jpg') no-repeat center center;
    background-size: cover;
}

/* FUNDO RANKING */
#ranking {
    background: url('fundo-ranking.jpg') no-repeat center center;
    background-size: cover;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 90px);
    gap: 12px;
    margin-top: 20px;
}

.card {
    width: 90px;
    height: 90px;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 28px;
    border-radius: 12px;
}

.card.flipped {
    background: white;
    color: black;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

input {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

.box {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h1>🧠 Jogo da Memória</h1>
        <p>Digite seu nome ou apelido:</p>
        <input type="text" id="playerName">
        <br><br>
        <button onclick="startGame()">Jogar</button>
    </div>
</div>

<!-- JOGO -->
<div id="game">
    <div class="box">
        <p>Jogador: <span id="playerDisplay"></span></p>
        <p>Tempo: <span id="time">180</span>s</p>
        <div class="grid" id="grid"></div>
    </div>
</div>

<!-- RANKING -->
<div id="ranking">
    <div class="box">
        <h2>🏆 Ranking</h2>
        <ol id="rankingList"></ol>
        <button onclick="restart()">Jogar novamente</button>
    </div>
</div>

<script>
let symbols = ["🍎","🍌","🍒","🍇","🍉","🍓","🍍","🥝","🍑","🍋"];
let cards = [];
let firstCard = null;
let secondCard = null;
let lock = false;
let matches = 0;
let time = 180;
let timer;
let player = "";

/* INICIAR */
function startGame() {
    player = document.getElementById("playerName").value;
    if (!player) return alert("Digite seu nome!");

    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "flex";

    document.getElementById("playerDisplay").innerText = player;

    startTimer();
    createCards();
}

/* TIMER */
function startTimer() {
    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            endGame(false);
        }
    }, 1000);
}

/* CARTAS */
function createCards() {
    cards = [...symbols, ...symbols];
    cards.sort(() => 0.5 - Math.random());

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    cards.forEach(symbol => {
        let card = document.createElement("div");
        card.classList.add("card");
        card.dataset.symbol = symbol;

        card.onclick = () => flipCard(card);
        grid.appendChild(card);
    });
}

/* VIRAR CARTA */
function flipCard(card) {
    if (lock || card.classList.contains("flipped")) return;

    card.classList.add("flipped");
    card.innerText = card.dataset.symbol;

    if (!firstCard) {
        firstCard = card;
    } else {
        secondCard = card;
        lock = true;

        if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
            matches++;
            resetTurn();

            if (matches === 10) {
                clearInterval(timer);
                endGame(true);
            }
        } else {
            setTimeout(() => {
                firstCard.classList.remove("flipped");
                secondCard.classList.remove("flipped");
                firstCard.innerText = "";
                secondCard.innerText = "";
                resetTurn();
            }, 800);
        }
    }
}

/* RESET */
function resetTurn() {
    firstCard = null;
    secondCard = null;
    lock = false;
}

/* FINAL */
function endGame(win) {
    if (win) {
        alert("Você venceu!");
        saveRanking(player, time);
    } else {
        alert("Tempo esgotado!");
    }

    showRanking();
}

/* RANKING */
function saveRanking(name, score) {
    let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
    ranking.push({name, score});
    ranking.sort((a,b) => b.score - a.score);
    ranking = ranking.slice(0, 5);
    localStorage.setItem("ranking", JSON.stringify(ranking));
}

function showRanking() {
    document.getElementById("game").style.display = "none";
    document.getElementById("ranking").style.display = "flex";

    let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
    let list = document.getElementById("rankingList");
    list.innerHTML = "";

    ranking.forEach(r => {
        let li = document.createElement("li");
        li.innerText = `${r.name} - ${r.score} pontos`;
        list.appendChild(li);
    });
}

/* REINICIAR */
function restart() {
    location.reload();
}
</script>

</body>
</html>
